services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
    command: sh -c "npm run db:migrate && npm start"
    expose:
      - "4000"
    networks:
      - dokploy-network

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
