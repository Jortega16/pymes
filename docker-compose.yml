services:
  pymes-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: "4000"
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
    command: sh scripts/start.sh
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    networks:
      internal:
        aliases:
          - pymes-api-internal
      dokploy-network:

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - pymes-api
    expose:
      - "80"
    networks:
      - internal
      - dokploy-network

networks:
  internal:
  dokploy-network:
    external: true
